# Argo CD — footprint mínimo para 1× t3.small (~2 GiB RAM, ~11 pods/nodo)
global:
  domain: argocd.local

configs:
  params:
    server.insecure: true

server:
  replicas: 1
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 192Mi

controller:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 192Mi

repoServer:
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

redis:
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

# Desactivar componentes no necesarios en dev (ahorra pods y RAM)
applicationSet:
  enabled: false
  replicaCount: 0

notifications:
  enabled: false

dex:
  enabled: false

redis-ha:
  enabled: false
