replicaCount: 1

image:
  repository: 565083285597.dkr.ecr.eu-north-1.amazonaws.com/ia-chatbot
  tag: bootstrap
  pullPolicy: IfNotPresent

secretName: ia-chatbot-secrets

env:
  MCP_SERVER_URL: "http://mcp-server.apps.svc.cluster.local:8000/mcp"
  GROQ_MODEL: "llama-3.1-8b-instant"
  GROQ_BASE_URL: "https://api.groq.com/openai/v1"
  HEALTH_PORT: "8080"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

livenessProbe:
  path: /health
  port: 8080
  initialDelaySeconds: 30
  periodSeconds: 20

readinessProbe:
  path: /health
  port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
